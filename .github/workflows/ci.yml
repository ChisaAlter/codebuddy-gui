name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:
    inputs:
      real_desktop_e2e:
        description: Run real Electron E2E on a dedicated authenticated test profile runner
        required: true
        type: boolean
        default: false

jobs:
  build-and-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests (vitest)
        run: npm test

      - name: Desktop harness contract
        run: npx vitest run tests/unit/e2e-harness.test.js

      - name: Capture registry-only baseline (BASELINE_FAIL / NOT_RELEASE_PASS)
        run: node scripts/test/e2e-baseline.cjs --allow-missing-sources

      - name: Build unpacked desktop artifact
        run: npm run build:dir

  real-desktop-e2e:
    name: Manual real desktop E2E — dedicated authenticated test profile
    needs: build-and-test
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.real_desktop_e2e }}
    runs-on: [self-hosted, Windows, codebuddy-authenticated]
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Preflight CodeBuddy CLI on dedicated authenticated test profile
        shell: powershell
        run: |
          if (-not (Get-Command codebuddy -ErrorAction SilentlyContinue)) {
            throw 'CodeBuddy CLI is required on this self-hosted runner and must be installed and authenticated before the workflow starts.'
          }
          codebuddy --version

      - name: Install repository dependencies
        run: npm ci

      - name: Capture registry-only baseline (BASELINE_FAIL / NOT_RELEASE_PASS)
        run: node scripts/test/e2e-baseline.cjs --allow-missing-sources

      - name: Unpackaged Electron behavior E2E
        run: npm run test:e2e:unpackaged
        env:
          CODEBUDDY_E2E_RUN_ID: manual-${{ github.run_id }}-${{ github.run_attempt }}-unpackaged

      - name: Packaged Electron behavior E2E
        run: npm run test:packaged
        env:
          CODEBUDDY_E2E_RUN_ID: manual-${{ github.run_id }}-${{ github.run_attempt }}-packaged

      - name: Upload sanitized desktop E2E evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: desktop-e2e-evidence-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            .omo/evidence/task-1-runs/
            .omo/evidence/task-1-baseline/
          if-no-files-found: ignore
